<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f46f8f" />
    <meta name="description" content="Cebolinha Gourmet - Cartão de Visita Eletrônico" />
    <title>Cebolinha Gourmet | Cartão de Visita Eletrônico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Allura&family=Baloo+2:wght@400;600;700;800&family=Bebas+Neue&family=Luckiest+Guy&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="grain" aria-hidden="true"></div>

    <main class="card" aria-label="Cartao de visita eletronico da Cebolinha Gourmet">
        <header class="hero reveal">
            <div class="brand-badge" role="img" aria-label="Marca Cebolinha Gourmet com tema de confeitaria">
                <div class="badge-ring">
                    <div class="badge-inner">
                        <img src="img/favicon.png" alt="Cebolinha Gourmet" />
                    </div>
                </div>
            </div>

            <h1 class="brand-title">Cebolinha</h1>
            <p class="brand-script">Gourmet</p>
            <!-- 
        <p class="brand-tagline">Bolos personalizados, Bolos de pote de todos os sabores.</p>
         -->
        </header>

        <section class="actions reveal" aria-label="Acoes rapidas de contato">
            <a class="action-btn whatsapp" href="https://wa.me/5595981165488" target="_blank" rel="noopener noreferrer"
                aria-label="Conversar no WhatsApp">
                <span class="icon"><i class="bi bi-whatsapp" aria-hidden="true"></i></span>
                <span class="label">WhatsApp 1</span>
            </a>

            <a class="action-btn whatsapp" href="https://wa.me/5595981105291" target="_blank" rel="noopener noreferrer"
                aria-label="Conversar no WhatsApp">
                <span class="icon"><i class="bi bi-whatsapp" aria-hidden="true"></i></span>
                <span class="label">WhatsApp 2</span>
            </a>

            <a class="action-btn call" href="tel:+5595981105291" target="_blank" rel="noopener noreferrer"
                aria-label="Ligar agora">
                <span class="icon"><i class="bi bi-telephone-fill" aria-hidden="true"></i></span>
                <span class="label">Ligar</span>
            </a>

            <a class="action-btn instagram" href="https://www.instagram.com/cebolinha_gourmet" target="_blank"
                rel="noopener noreferrer" aria-label="Abrir Instagram">
                <span class="icon"><i class="bi bi-instagram" aria-hidden="true"></i></span>
                <span class="label">Instagram</span>
            </a>
            <!-- 
        <a
          class="action-btn maps"
          href="https://maps.google.com/?q=Cebolinha+Gourmet"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Ver endereco no mapa"
        >
          <span class="icon"
            ><i class="bi bi-geo-alt-fill" aria-hidden="true"></i
          ></span>
          <span class="label">Endereco</span>
        </a>
        -->
        </section>

        <section class="highlights reveal" aria-label="Destaques da marca">
            <article class="highlight-pill">
                <h2>Encomendas Personalizadas</h2>
                <p>Bolos artísticos, Bolos de pote e kits exclusivos. Agendamento rápido para a entrega de seu bolo.</p>
            </article>
        <!--  
        <article class="highlight-pill">
          <h2>Entrega Programada</h2>
          <p>Agendamento rápido para a entrega de seu bolo.</p>
        </article>
        -->
        </section>

        <footer class="footer reveal">
            <button class="save-contact" id="copyContact" type="button">
                Copiar contato
            </button>
            <p class="note">Clique nos ícones para interagir</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
